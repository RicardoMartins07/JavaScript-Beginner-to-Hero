<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <h1>⏳ Countdown Timer</h1>

      <div class="inputs">
        <div class="input-box">
          <label>Minutes</label>
          <input type="number" id="minutes" min="0" placeholder="00" />
        </div>
        <div class="input-box">
          <label>Seconds</label>
          <input type="number" id="seconds" min="0" max="59" placeholder="00" />
        </div>
      </div>

      <div class="display" id="display">00:00</div>

      <div class="buttons">
        <button id="start" class="btn start">Start</button>
        <button id="pause" class="btn pause">Pause</button>
        <button id="reset" class="btn reset">Reset</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
